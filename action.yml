name: 'cco run'
description: 'Run a cco pipeline from a GitHub issue overview'
branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  profile:
    description: >
      Profile name. Must match a directory under .github/cco/<profile>/ in
      the calling repo containing profile.yaml.
    required: true
  issue-number:
    description: 'GitHub issue number whose body becomes the pipeline overview (overview.md)'
    required: true
  resume-run-id:
    description: >
      Optional run_id of a previous workflow run to resume from. When set, the
      run folder from that run's latest attempt is restored and cco skips
      already-passed stages. Use this to resume a run that failed under an older
      workflow/action commit, where "Re-run failed jobs" cannot pick it up.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Rewrite GitHub HTTPS to SSH
      shell: bash
      run: git config --global url."ssh://git@github.com/".insteadOf "https://github.com/"

    - name: Install cco + cco-profiles
      shell: bash
      run: |
        CCO_ENV="$RUNNER_TEMP/cco-env"
        uv venv "$CCO_ENV"
        uv pip install --python "$CCO_ENV/bin/python" \
          "cco-profiles @ git+https://github.com/gezpage/cco-profiles.git"
        echo "$CCO_ENV/bin" >> "$GITHUB_PATH"

    - name: Fetch issue body and derive feature slug
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p "$RUNNER_TEMP/cco-input"
        gh issue view "${{ inputs.issue-number }}" --json body,title,comments \
          > "$RUNNER_TEMP/cco-input/issue.json"

        # Write issue body
        jq -r '.body' "$RUNNER_TEMP/cco-input/issue.json" \
          > "$RUNNER_TEMP/cco-input/overview.md"

        # Append each comment as a numbered section (body only, no metadata)
        jq -r '.comments | to_entries[] | "\n## Comment \(.key + 1)\n\n\(.value.body)"' \
          "$RUNNER_TEMP/cco-input/issue.json" \
          >> "$RUNNER_TEMP/cco-input/overview.md"

        TITLE=$(jq -r '.title' "$RUNNER_TEMP/cco-input/issue.json")
        SLUG=$(printf '%s' "$TITLE" \
          | tr '[:upper:]' '[:lower:]' \
          | sed 's/[^a-z0-9]/-/g' \
          | sed 's/-\{2,\}/-/g' \
          | sed 's/^-//; s/-$//' \
          | cut -c1-50)
        echo "CCO_FEATURE=${SLUG:-issue-${{ inputs.issue-number }}}" >> "$GITHUB_ENV"
        echo "CCO_BRANCH=cco/${SLUG:-issue-${{ inputs.issue-number }}}" >> "$GITHUB_ENV"

    - name: Checkout feature branch
      shell: bash
      run: |
        # For a resume the integration branch already exists on origin — fetch and
        # check it out so cco forks worktrees from the right tip. For a fresh run
        # it won't exist yet — create it from the current HEAD.
        if git ls-remote --exit-code --heads origin "$CCO_BRANCH" > /dev/null 2>&1; then
          git fetch origin "$CCO_BRANCH"
          git checkout "$CCO_BRANCH"
        else
          git checkout -b "$CCO_BRANCH"
        fi

    - name: Restore prior run folder (resume)
      # Two ways to resume, both feeding $RUNNER_TEMP/cco-run before `cco run`,
      # which skips stages already marked passed (we don't use `cco resume` — it
      # lacks the flat-mode flags this action relies on, ADR-053):
      #   1. resume-run-id input set → restore the latest attempt's run folder
      #      from that run. Use for runs that failed under an older commit.
      #   2. "Re-run failed jobs" → github.run_attempt increments while run_id
      #      stays the same; restore the previous attempt's run folder.
      if: ${{ inputs.resume-run-id != '' || github.run_attempt > 1 }}
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p "$RUNNER_TEMP/cco-run"
        RESUME_RUN_ID="${{ inputs.resume-run-id }}"
        if [ -n "$RESUME_RUN_ID" ]; then
          SRC_RUN="$RESUME_RUN_ID"
          # Attempt number is unknown; pick the highest-numbered run folder.
          ARTIFACT=$(gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${SRC_RUN}/artifacts" \
            --jq '.artifacts[].name | select(startswith("cco-run-"))' \
            2>/dev/null | sort -V | tail -1)
        else
          SRC_RUN="${{ github.run_id }}"
          ARTIFACT="cco-run-${SRC_RUN}-attempt-$(( ${{ github.run_attempt }} - 1 ))"
        fi
        echo "::group::Resume: restoring run folder from ${ARTIFACT:-<none>} (run $SRC_RUN)"
        if [ -z "$ARTIFACT" ]; then
          echo "No cco-run-* artifact found on run $SRC_RUN — starting a fresh run."
        elif gh run download "$SRC_RUN" \
            --repo "${{ github.repository }}" \
            --name "$ARTIFACT" \
            --dir "$RUNNER_TEMP/cco-run"; then
          echo "Restored prior run folder; cco will skip already-passed stages."
        else
          echo "Could not download $ARTIFACT — starting a fresh run."
        fi
        echo "::endgroup::"

    - name: Run cco pipeline
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Generate the project.yaml cco anchors on (flat mode, ADR-053).
        # repo-root must point at the checked-out repo; callers don't commit one.
        mkdir -p "$RUNNER_TEMP/cco-project"
        cat > "$RUNNER_TEMP/cco-project/project.yaml" <<EOF
        repo-root: "$(pwd)"
        EOF

        # Only pass --primary-profiles-dir and --prompts-dir when the repo
        # has a local profile directory; bundled profiles don't need them.
        PROFILE_DIR=".github/cco/${{ inputs.profile }}"
        EXTRA_ARGS=""
        if [ -d "$PROFILE_DIR" ]; then
          EXTRA_ARGS="--primary-profiles-dir $PROFILE_DIR/ --prompts-dir $PROFILE_DIR/prompts/"
        fi

        set -o pipefail
        cco run \
          --project-config "$RUNNER_TEMP/cco-project/project.yaml" \
          --run-folder "$RUNNER_TEMP/cco-run/" \
          --feature-path "$RUNNER_TEMP/cco-input" \
          --profile "${{ inputs.profile }}" \
          --branch "$CCO_BRANCH" \
          --issue "${{ inputs.issue-number }}" \
          $EXTRA_ARGS \
          2>&1 | python3 -u "$GITHUB_ACTION_PATH/scripts/group_output.py"

    - name: Show git status on failure
      if: failure()
      shell: bash
      run: |
        echo "### git status at failure" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        git status --porcelain >> "$GITHUB_STEP_SUMMARY" || true
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Write pipeline summary
      if: always()
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/write_summary.py"

    - name: Upload run artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cco-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
        path: ${{ runner.temp }}/cco-run/
        if-no-files-found: warn
