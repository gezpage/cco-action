name: 'cco run'
description: 'Run a cco pipeline from a GitHub issue overview'
branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  profile:
    description: >
      Profile name. Must match a directory under .github/cco/<profile>/ in
      the calling repo containing profile.yaml.
    required: true
  issue-number:
    description: 'GitHub issue number whose body becomes the pipeline overview (overview.md)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Rewrite GitHub HTTPS to SSH
      shell: bash
      run: git config --global url."ssh://git@github.com/".insteadOf "https://github.com/"

    - name: Install cco + cco-profiles
      shell: bash
      run: |
        # Install only cco-profiles; its [tool.uv.sources] pulls in cco from git
        # (single URL source — no conflict). The git rewrite above redirects the
        # HTTPS fetch to SSH. cco's console script lands at $CCO_ENV/bin/cco.
        CCO_ENV="$RUNNER_TEMP/cco-env"
        uv venv "$CCO_ENV"
        uv pip install --python "$CCO_ENV/bin/python" \
          "cco-profiles @ git+https://github.com/gezpage/cco-profiles.git"
        echo "$CCO_ENV/bin" >> "$GITHUB_PATH"

    - name: Fetch issue body and derive feature slug
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p "$RUNNER_TEMP/cco-input"
        gh issue view "${{ inputs.issue-number }}" --json body -q .body \
          > "$RUNNER_TEMP/cco-input/overview.md"

        TITLE=$(gh issue view "${{ inputs.issue-number }}" --json title -q .title)
        SLUG=$(printf '%s' "$TITLE" \
          | tr '[:upper:]' '[:lower:]' \
          | sed 's/[^a-z0-9]/-/g' \
          | sed 's/-\{2,\}/-/g' \
          | sed 's/^-//; s/-$//' \
          | cut -c1-50)
        echo "CCO_FEATURE=${SLUG:-issue-${{ inputs.issue-number }}}" >> "$GITHUB_ENV"
        echo "CCO_BRANCH=cco/${SLUG:-issue-${{ inputs.issue-number }}}" >> "$GITHUB_ENV"

    - name: Run cco pipeline
      shell: bash
      run: |
        cco run \
          --project-config ./project.yaml \
          --primary-profiles-dir ".github/cco/${{ inputs.profile }}/" \
          --prompts-dir ".github/cco/${{ inputs.profile }}/prompts/" \
          --run-folder "$RUNNER_TEMP/cco-run/" \
          --feature-path "$RUNNER_TEMP/cco-input" \
          --profile "${{ inputs.profile }}" \
          --branch "$CCO_BRANCH"

    - name: Write plan.md to job summary
      if: always()
      shell: bash
      run: |
        PLAN="$RUNNER_TEMP/cco-run/plan.md"
        if [ -f "$PLAN" ]; then
          cat "$PLAN" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "_No plan.md found — pipeline may not have started._" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload run folder as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cco-run
        path: ${{ runner.temp }}/cco-run/
        if-no-files-found: warn
