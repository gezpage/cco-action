name: 'cco run'
description: 'Run a cco pipeline from a GitHub issue overview'
branding:
  icon: 'cpu'
  color: 'blue'

inputs:
  profile:
    description: >
      Profile name. Must match a directory under .github/cco/<profile>/ in
      the calling repo containing profile.yaml.
    required: true
  issue-number:
    description: 'GitHub issue number whose body becomes the pipeline overview (overview.md)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Rewrite GitHub HTTPS to SSH
      shell: bash
      run: git config --global url."ssh://git@github.com/".insteadOf "https://github.com/"

    - name: Install cco + cco-profiles
      shell: bash
      run: |
        # Install only cco-profiles; its [tool.uv.sources] pulls in cco from git
        # (single URL source — no conflict). The git rewrite above redirects the
        # HTTPS fetch to SSH. cco's console script lands at $CCO_ENV/bin/cco.
        CCO_ENV="$RUNNER_TEMP/cco-env"
        uv venv "$CCO_ENV"
        uv pip install --python "$CCO_ENV/bin/python" \
          "cco-profiles @ git+https://github.com/gezpage/cco-profiles.git"
        echo "$CCO_ENV/bin" >> "$GITHUB_PATH"

    - name: Fetch issue body and derive feature slug
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p "$RUNNER_TEMP/cco-input"
        gh issue view "${{ inputs.issue-number }}" --json body -q .body \
          > "$RUNNER_TEMP/cco-input/overview.md"

        TITLE=$(gh issue view "${{ inputs.issue-number }}" --json title -q .title)
        SLUG=$(printf '%s' "$TITLE" \
          | tr '[:upper:]' '[:lower:]' \
          | sed 's/[^a-z0-9]/-/g' \
          | sed 's/-\{2,\}/-/g' \
          | sed 's/^-//; s/-$//' \
          | cut -c1-50)
        echo "CCO_FEATURE=${SLUG:-issue-${{ inputs.issue-number }}}" >> "$GITHUB_ENV"
        echo "CCO_BRANCH=cco/${SLUG:-issue-${{ inputs.issue-number }}}" >> "$GITHUB_ENV"

    - name: Run cco pipeline
      shell: bash
      run: |
        mkdir -p "$RUNNER_TEMP/cco-project"
        sed "s|repo-root:.*|repo-root: \"$(pwd)\"|" ./project.yaml \
          > "$RUNNER_TEMP/cco-project/project.yaml"

        # Wrap cco output through a Python filter that injects GitHub Actions
        # log-grouping markers (::group:: / ::endgroup::) each time a new stage
        # is dispatched. This gives a collapsible section per stage in the
        # Actions log viewer without requiring any changes to cco itself.
        set -o pipefail
        cco run \
          --project-config "$RUNNER_TEMP/cco-project/project.yaml" \
          --primary-profiles-dir ".github/cco/${{ inputs.profile }}/" \
          --prompts-dir ".github/cco/${{ inputs.profile }}/prompts/" \
          --run-folder "$RUNNER_TEMP/cco-run/" \
          --feature-path "$RUNNER_TEMP/cco-input" \
          --profile "${{ inputs.profile }}" \
          --branch "$CCO_BRANCH" \
        2>&1 | python3 -u - <<'PYEOF'
import sys, re

DISPATCH_RE = re.compile(r'^\[cco\] \[([^\]]+)\] dispatching ')
PIPELINE_END_RE = re.compile(r'^\[cco\] \[pipeline\] (?:core pipeline|draft PR|PR finalisation|finaliser)')

in_group = False

for line in sys.stdin:
    sys.stdout.write(line)
    sys.stdout.flush()

    if DISPATCH_RE.match(line):
        stage = DISPATCH_RE.match(line).group(1)
        if in_group:
            print('::endgroup::', flush=True)
        print(f'::group::{stage}', flush=True)
        in_group = True
    elif in_group and PIPELINE_END_RE.match(line):
        print('::endgroup::', flush=True)
        in_group = False

if in_group:
    print('::endgroup::', flush=True)
PYEOF

    - name: Show git status on failure
      if: failure()
      shell: bash
      run: |
        echo "### git status at failure" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        git status --porcelain >> "$GITHUB_STEP_SUMMARY" || true
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Write pipeline summary
      if: always()
      shell: bash
      run: |
        python3 - <<'PYEOF'
import os, sys
from pathlib import Path

try:
    import yaml
except ImportError:
    sys.exit(0)

run_folder = Path(os.environ["RUNNER_TEMP"]) / "cco-run"
summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "")
state_path = run_folder / "_state.yaml"
plan_path = run_folder / "plan.md"

if not summary_path:
    sys.exit(0)

with open(summary_path, "a") as out:
    state = yaml.safe_load(state_path.read_text()) if state_path.exists() else {}
    stages = state.get("stages", {})
    elapsed = state.get("elapsed", {})
    profile = state.get("profile", "unknown")
    branch = state.get("branch", "")

    # Overall status from worst stage status
    PRECEDENCE = ["failed", "blocked", "changes-requested", "in_progress", "passed", "skipped", "pending"]
    all_statuses = list(stages.values())
    overall = next((s for s in PRECEDENCE if s in all_statuses), "pending") if all_statuses else "pending"
    icon = {"passed": "✅", "failed": "❌", "blocked": "🚫", "in_progress": "⏳"}.get(overall, "⏳")

    out.write(f"## {icon} cco — {profile}\n\n")
    if branch:
        out.write(f"**Branch:** `{branch}`\n\n")

    if stages:
        out.write("| Stage | Status | Elapsed |\n")
        out.write("|---|---|---|\n")
        for stage, status in stages.items():
            si = {"passed": "✅", "failed": "❌", "blocked": "🚫", "skipped": "⏭️",
                  "changes-requested": "🔄", "in_progress": "⏳"}.get(status, "⏳")
            secs = int(elapsed.get(stage, 0))
            mins, s = divmod(secs, 60)
            elapsed_str = f"{mins}m {s}s" if mins else f"{s}s"
            out.write(f"| `{stage}` | {si} {status} | {elapsed_str} |\n")
        out.write("\n")

    if plan_path.exists():
        out.write("---\n\n")
        out.write(plan_path.read_text())
    elif not stages:
        out.write("_Pipeline did not start — no plan.md or state found._\n")
PYEOF

    - name: Upload run artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cco-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
        path: ${{ runner.temp }}/cco-run/
        if-no-files-found: warn
